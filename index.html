<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#f8fafc">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22Lecture%20Preview%22%2C%22short_name%22%3A%22Lectures%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f0f2f5%22%2C%22theme_color%22%3A%22%232563eb%22%7D">
<title>Lecture Preview</title>
<style>
:root{--bg:#f0f2f5;--card:#fff;--bd:#e5e7eb;--tx:#1a1a2e;--sub:#8892a4;--ac:#2563eb;--green:#16a34a;--R:16px;--safe-b:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',system-ui,sans-serif;
background:var(--bg);color:var(--tx);line-height:1.65;-webkit-font-smoothing:antialiased;
-webkit-tap-highlight-color:transparent;overscroll-behavior-y:contain}
.w{max-width:680px;margin:0 auto;padding:0 14px calc(80px + var(--safe-b))}
#lock{position:fixed;inset:0;background:linear-gradient(160deg,#667eea,#764ba2);z-index:200;
display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
#lock.off{display:none}
.lk-i{width:56px;height:56px;background:rgba(255,255,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px}
#lock h2{font-size:18px;font-weight:700;color:#fff}
#lock input{width:240px;padding:14px 18px;border-radius:14px;border:2px solid rgba(255,255,255,.25);
background:rgba(255,255,255,.12);color:#fff;font-size:16px;text-align:center;outline:none;
backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
#lock input::placeholder{color:rgba(255,255,255,.5)}
#lock input:focus{border-color:rgba(255,255,255,.6)}
#lock button{padding:12px 40px;border-radius:14px;border:none;background:#fff;color:#764ba2;
font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 15px rgba(0,0,0,.15)}
#lock button:active{transform:scale(.96)}
#lock .err{color:#fca5a5;font-size:12px;min-height:18px}
#app{display:none}#app.on{display:block}
.hdr{padding:20px 4px 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.hdr h1{font-size:20px;font-weight:800;letter-spacing:-.5px}
.hdr small{font-size:11px;color:var(--sub)}
.hdr-st{display:flex;gap:6px}
.sc{font-size:11px;font-weight:600;padding:4px 10px;border-radius:10px;background:var(--card);border:1px solid var(--bd);color:var(--sub)}
.sc b{color:var(--tx)}
.sw{position:relative;padding:4px 0 12px}
.si{width:100%;padding:12px 16px 12px 40px;border-radius:14px;border:1px solid var(--bd);
background:var(--card);font-size:14px;outline:none;transition:.2s}
.si:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.sw::before{content:'\1F50D';position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}
.fs{display:flex;gap:8px;overflow-x:auto;padding:4px 2px 12px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.fs::-webkit-scrollbar{display:none}
.fc{flex:0 0 auto;padding:8px 16px;border-radius:20px;border:1px solid var(--bd);
background:var(--card);font-size:12px;font-weight:600;cursor:pointer;transition:.15s;white-space:nowrap;min-height:36px}
.fc.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.fc:active{transform:scale(.96)}
.btm{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(255,255,255,.92);
backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
border-top:1px solid var(--bd);padding:6px 8px calc(6px + var(--safe-b));
display:flex;gap:2px;box-shadow:0 -2px 10px rgba(0,0,0,.06)}
.bt{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;
border-radius:12px;color:var(--sub);font-size:10px;font-weight:600;cursor:pointer;
transition:.15s;-webkit-user-select:none;border:none;background:none}
.bt.on{color:var(--ac)}
.bt .bi{font-size:20px;line-height:1}
.pn{display:none}.pn.on{display:block;animation:fu .25s ease}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.sh{font-size:14px;font-weight:700;color:var(--sub);padding:16px 4px 8px;display:flex;align-items:center;gap:6px}
.sh::before{content:'';width:3px;height:16px;border-radius:2px;background:var(--ac)}
.cd{background:var(--card);border:1px solid var(--bd);border-radius:var(--R);margin-bottom:12px;
overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.ct{padding:16px;cursor:pointer;position:relative}.ct:active{background:#f8fafc}
.cm{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.ln{font-size:11px;font-weight:800;color:#fff;background:var(--ac);padding:3px 10px;border-radius:8px}
.cp{font-size:10px;font-weight:600;color:var(--sub);background:#f1f5f9;padding:3px 8px;border-radius:6px}
.rt{font-size:11px;color:var(--green);font-weight:600}
.cc{font-size:11px;color:var(--sub)}
.ctt{font-size:15px;font-weight:700;line-height:1.4;margin-bottom:2px;padding-right:30px}
.cfn{font-size:11px;color:var(--sub);font-family:monospace}
.ei{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:20px;color:var(--sub);font-weight:300;transition:.2s}
.ei.op{transform:translateY(-50%) rotate(45deg)}
.pw{display:flex;align-items:center;gap:8px;margin-bottom:6px;position:relative}
.pw::before{content:'';position:absolute;left:0;width:100%;height:4px;background:#e2e8f0;border-radius:2px}
.pb{height:4px;background:var(--ac);border-radius:2px;position:relative;z-index:1;transition:.3s}
.pl{font-size:10px;color:var(--sub);font-weight:600;white-space:nowrap;margin-left:auto;flex-shrink:0}
.cb{padding:0 16px 16px;border-top:1px solid var(--bd);display:none}
.vt{display:flex;gap:4px;padding:12px 0 8px}
.vb{padding:8px 16px;border-radius:10px;border:1px solid var(--bd);background:var(--card);
font-size:12px;font-weight:600;cursor:pointer;transition:.15s;color:var(--sub)}
.vb.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.vb:active{transform:scale(.96)}
.toc{padding:10px 0;margin-bottom:10px;border-bottom:1px solid var(--bd)}
.toc-t{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.toc a{display:block;font-size:13px;color:var(--ac);text-decoration:none;padding:4px 0 4px 10px;
border-left:2px solid transparent;transition:.15s}
.toc a:active{border-left-color:var(--ac);background:#f8fafc}
.cmeta{font-size:11px;color:var(--sub);padding:8px 0;font-weight:600}
.mb{font-size:14px;line-height:1.8;overflow-x:auto}
.mb h1{font-size:20px;font-weight:800;margin:20px 0 10px;padding-bottom:6px;border-bottom:2px solid var(--bd)}
.mb h2{font-size:17px;font-weight:700;margin:18px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--bd)}
.mb h3{font-size:15px;font-weight:700;margin:14px 0 6px}
.mb h4{font-size:14px;font-weight:700;margin:12px 0 4px}
.mb p{margin:8px 0}.mb ul,.mb ol{padding-left:20px;margin:8px 0}.mb li{margin:4px 0}
.mb blockquote{border-left:3px solid var(--ac);padding:8px 14px;margin:10px 0;
background:#f0f4ff;border-radius:0 8px 8px 0;font-style:italic;color:#4b5563}
.mb pre{background:#1e1e2e;color:#cdd6f4;padding:14px 16px;border-radius:10px;
overflow-x:auto;margin:10px 0;font-size:13px;line-height:1.5}
.mb code{background:#f1f5f9;padding:2px 6px;border-radius:4px;font-size:13px;color:#e11d48}
.mb pre code{background:none;padding:0;color:inherit}
.mb table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
.mb th,.mb td{border:1px solid var(--bd);padding:8px 10px;text-align:left}
.mb th{background:#f8fafc;font-weight:700}
.mb hr{border:none;border-top:1px solid var(--bd);margin:16px 0}
.mb a{color:var(--ac);text-decoration:underline}
.mb strong{font-weight:700}
.ca{padding:12px 0 4px;border-top:1px solid var(--bd);margin-top:12px}
.cpb{padding:10px 20px;border-radius:10px;border:1px solid var(--bd);background:var(--card);
font-size:13px;font-weight:600;cursor:pointer;transition:.15s;color:var(--tx);min-height:44px}
.cpb:active{background:var(--ac);color:#fff;border-color:var(--ac);transform:scale(.96)}
.cpb.ok{background:var(--green);color:#fff;border-color:var(--green)}
/* Edit mode */
.edit-btn{padding:10px 20px;border-radius:10px;border:1px solid #f59e0b;background:#fffbeb;
font-size:13px;font-weight:600;cursor:pointer;color:#92400e;min-height:44px;margin-left:8px}
.edit-btn:active{background:#f59e0b;color:#fff}
.edit-area{margin-top:12px;display:none}
.edit-area.on{display:block}
.edit-ta{width:100%;min-height:300px;padding:14px;border:2px solid #e2e8f0;border-radius:12px;
font-family:'Hiragino Sans','Noto Sans JP',monospace;font-size:14px;line-height:1.7;
resize:vertical;outline:none;transition:.2s;color:var(--tx);background:#fff}
.edit-ta:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.edit-actions{display:flex;gap:8px;margin-top:8px}
.edit-save{flex:2;padding:12px;border-radius:10px;border:none;background:var(--green);color:#fff;
font-size:14px;font-weight:700;cursor:pointer;min-height:48px}
.edit-save:active{transform:scale(.97)}
.edit-cancel{flex:1;padding:12px;border-radius:10px;border:1px solid var(--bd);background:var(--card);
font-size:13px;font-weight:600;cursor:pointer;color:var(--sub)}
.edit-discard{flex:1;padding:12px;border-radius:10px;border:1px solid #fca5a5;background:#fef2f2;
font-size:13px;font-weight:600;cursor:pointer;color:#dc2626}
.edit-saved{font-size:11px;color:var(--green);font-weight:600;margin-top:4px}
.edit-badge{position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;
background:#f59e0b;color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;
box-shadow:0 1px 3px rgba(0,0,0,.2)}
.edits-bar{background:linear-gradient(135deg,#fffbeb,#fef3c7);border:1px solid #f59e0b;border-radius:var(--R);
padding:14px 16px;margin-bottom:12px;display:none}
.edits-bar.on{display:block}
.edits-bar-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.edits-bar-count{font-size:14px;font-weight:700;color:#92400e}
.edits-bar-actions{display:flex;gap:8px}
.export-btn{padding:10px 20px;border-radius:10px;border:none;background:#f59e0b;color:#fff;
font-size:13px;font-weight:700;cursor:pointer;min-height:44px}
.export-btn:active{transform:scale(.97)}
.clear-edits-btn{padding:10px 16px;border-radius:10px;border:1px solid #fca5a5;background:#fff;
font-size:12px;font-weight:600;cursor:pointer;color:#dc2626}
.edited-marker{display:inline-block;width:8px;height:8px;border-radius:50%;background:#f59e0b;margin-left:6px}
.cci{background:var(--card);border:1px solid var(--bd);border-radius:var(--R);padding:20px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.cci h3{font-size:17px;font-weight:700;margin-bottom:2px}
.cci .jp{font-size:13px;color:var(--sub);margin-bottom:12px}
.csg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.csi{text-align:center;padding:8px;background:#f8fafc;border-radius:10px}
.csi b{display:block;font-size:20px;font-weight:800;color:var(--ac)}
.csi span{font-size:10px;color:var(--sub);font-weight:600;text-transform:uppercase}
.cci .meta{font-size:11px;color:var(--sub)}
.nr{text-align:center;padding:40px 20px;color:var(--sub);font-size:14px}
</style>
</head>

// Decompress
function init(){
const bin=atob(B64);const bytes=new Uint8Array(bin.length);
for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
const cs=new DecompressionStream('deflate');
const w=cs.writable.getWriter();const r=cs.readable.getReader();
let chunks=[];
r.read().then(function proc({done,value}){
if(done){
const dec=new TextDecoder();
const full=chunks.map(c=>dec.decode(c,{stream:true})).join('')+dec.decode();
D=JSON.parse(full);render();return;
}
chunks.push(value);return r.read().then(proc);
});
w.write(bytes);w.close();
}

// Password
function tryUnlock(){
const p=document.getElementById('pw').value;
crypto.subtle.digest('SHA-256',new TextEncoder().encode(p)).then(buf=>{
const h=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
if(h===H){sessionStorage.setItem('lp-ok','1');show()}
else{document.getElementById('err').textContent='Incorrect password'}
});
}
function show(){document.getElementById('lock').classList.add('off');document.getElementById('app').classList.add('on');init()}
if(sessionStorage.getItem('lp-ok')==='1')show();
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')tryUnlock()});

// MD to HTML (client-side)
function md2h(t){
t=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
t=t.replace(/```(\w*)\n([\s\S]*?)```/g,(m,l,c)=>'<pre><code>'+ c+'</code></pre>');
t=t.replace(/`([^`]+)`/g,'<code>$1</code>');
// tables
let lines=t.split('\n'),res=[],inT=false;
for(let i=0;i<lines.length;i++){
let s=lines[i].trim();
if(s.startsWith('|')&&s.endsWith('|')&&s.includes('|')){
let cells=s.split('|').slice(1,-1).map(c=>c.trim());
if(cells.every(c=>/^:?-+:?$/.test(c)))continue;
if(!inT){res.push('<table>');inT=true;res.push('<tr>'+cells.map(c=>'<th>'+c+'</th>').join('')+'</tr>')}
else res.push('<tr>'+cells.map(c=>'<td>'+c+'</td>').join('')+'</tr>');
}else{
if(inT){res.push('</table>');inT=false}
res.push(lines[i]);
}
}
if(inT)res.push('</table>');
t=res.join('\n');
t=t.replace(/^(#{1,6})\s+(.+)$/gm,(m,h,c)=>{
let lv=h.length;let id='h-'+Math.random().toString(36).substr(2,8);
return '<h'+lv+' id="'+id+'">'+c.trim()+'</h'+lv+'>';
});
t=t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
t=t.replace(/\*(.+?)\*/g,'<em>$1</em>');
t=t.replace(/~~(.+?)~~/g,'<del>$1</del>');
t=t.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
t=t.replace(/^&gt;\s*(.+)$/gm,'<blockquote>$1</blockquote>');
t=t.replace(/^[-*]\s+(.+)$/gm,'<li>$1</li>');
t=t.replace(/((?:<li>.*<\/li>\n?)+)/g,'<ul>$1</ul>');
t=t.replace(/^---+$/gm,'<hr>');
t=t.replace(/\n\n+/g,'</p><p>');
return '<p>'+t+'</p>';
}

function tocFromMd(t){
let h=[];const re=/^##\s+(.+)$/gm;let m;
while((m=re.exec(t))!==null){
let txt=m[1].replace(/[\u{1F300}-\u{1F9FF}\u{2700}-\u{27BF}]/gu,'').trim();
h.push(txt);
}
return h;
}

function render(){
if(!D)return;
renderCourses();renderList('le','Lectures');renderList('ma','Manual');renderList('mk','Marketing');
}

function renderCourses(){
let cs={};
D.forEach(i=>{
if(!cs[i.c])cs[i.c]={l:0,m:0,k:0,o:0,ch:0,hu:0};
cs[i.c].ch+=i.ch;
if(i.hmd)cs[i.c].hu++;
if(i.s==='Lectures')cs[i.c].l++;
else if(i.s==='Manual')cs[i.c].m++;
else if(i.s==='Marketing')cs[i.c].k++;
else cs[i.c].o++;
});
let h='';
for(let c of Object.keys(cs).sort()){
let s=cs[c],nm=CN[c]||c,rm=Math.max(1,Math.round(s.ch/500));
h+=`<div class="cci"><h3>${nm}</h3><div class="jp">${c}</div>
<div class="csg">
<div class="csi"><b>${s.l}</b><span>Lessons</span></div>
<div class="csi"><b>${s.m}</b><span>Manuals</span></div>
<div class="csi"><b>${s.k}</b><span>Marketing</span></div>
<div class="csi"><b>${s.o}</b><span>Other</span></div>
</div>
<div class="meta">${s.ch.toLocaleString()} chars | ~${rm} min${s.hu?' | '+s.hu+' humanized':''}</div></div>`;
}
document.getElementById('co').innerHTML=h;
}

function renderList(elId,section){
let items=D.filter(i=>section==='Marketing'?i.s==='Marketing':(section==='Lectures'?(i.s==='Lectures'||i.s==='Other'):i.s===section));
let byCourse={};
items.forEach(i=>{if(!byCourse[i.c])byCourse[i.c]=[];byCourse[i.c].push(i)});
let h='';
for(let c of Object.keys(byCourse).sort()){
let ci=byCourse[c],nm=CN[c]||c;
h+=`<div class="sh" data-c="${c}">${nm} (${ci.length})</div>`;
let total=ci.length;
ci.forEach((it,idx)=>{
let id='i'+Math.random().toString(36).substr(2,8);
it._id=id;
let lnH=it.n>0?`<span class="ln">Lesson ${String(it.n).padStart(2,'0')}</span>`:'';
let cpH=`<span class="cp">${nm}</span>`;
let pct=total>1?Math.round((idx+1)/total*100):100;
let prH=it.n>0?`<div class="pw"><div class="pb" style="width:${pct}%"></div><span class="pl">${idx+1}/${total}</span></div>`:'';
h+=`<div class="cd" data-c="${c}" data-s="${it.s}" data-t="${(it.t+' '+it.f).toLowerCase()}">
<div class="ct" onclick="tog('${id}')">
<div class="cm">${lnH}${cpH}<span class="rt">${it.rm} min</span><span class="cc">${it.ch.toLocaleString()} chars</span></div>
${prH}
<div class="ctt">${esc(it.t)}</div>
<div class="cfn">${esc(it.f)}</div>
<div class="ei" id="e-${id}">+</div>
</div>
<div class="cb" id="b-${id}" data-idx="${D.indexOf(it)}"></div>
</div>`;
});
}
document.getElementById(elId).innerHTML=h||'<div class="nr">No items</div>';
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function tog(id){
let b=document.getElementById('b-'+id),e=document.getElementById('e-'+id);
if(b.style.display==='block'){
b.style.display='none';e.classList.remove('op');e.textContent='+';
}else{
// Lazy render content
if(!b.dataset.rendered){
let idx=parseInt(b.dataset.idx);let it=D[idx];
let tocH='';
let toc=tocFromMd(it.md);
if(toc.length>1){
tocH='<div class="toc"><div class="toc-t">Table of Contents</div>'+
toc.slice(0,15).map(t=>'<a href="#">'+esc(t)+'</a>').join('')+'</div>';
}
let vtH='';
if(it.hmd){
vtH=`<div class="vt"><button class="vb on" onclick="sv('${id}','o')">Original</button><button class="vb" onclick="sv('${id}','h')">Humanized</button></div>`;
}
let hcH='';
if(it.hmd){
hcH=`<div id="vh-${id}" style="display:none"><div class="cmeta">Humanized | ${(it.hch||0).toLocaleString()} chars | ${it.hrm||1} min</div><div class="mb">${md2h(it.hmd)}</div></div>`;
}
let editKey='edit-'+it.fp;
let hasEdit=localStorage.getItem(editKey);
let editedH=hasEdit?'<span class="edited-marker" title="Has pending edit"></span>':'';
let editBtnH=`<button class="edit-btn" onclick="event.stopPropagation();openEdit('${id}',${D.indexOf(it)})">&#x270F; Edit</button>`;
b.innerHTML=vtH+tocH+
`<div id="vo-${id}"><div class="cmeta">Original | ${it.ch.toLocaleString()} chars | ${it.rm} min${editedH}</div><div class="mb">${md2h(hasEdit||it.md)}</div></div>`+
hcH+
`<div class="edit-area" id="ea-${id}"><textarea class="edit-ta" id="et-${id}"></textarea><div class="edit-actions"><button class="edit-save" onclick="saveEdit('${id}',${D.indexOf(it)})">Save Edit</button><button class="edit-cancel" onclick="cancelEdit('${id}')">Cancel</button>${hasEdit?`<button class="edit-discard" onclick="discardEdit('${id}',${D.indexOf(it)})">Discard</button>`:''}</div><div class="edit-saved" id="es-${id}"></div></div>`+
`<div class="ca"><button class="cpb" onclick="cp('${id}')">Copy</button>${editBtnH}</div>`;
b.dataset.rendered='1';
}
b.style.display='block';e.classList.add('op');e.textContent='\u00D7';
}
}

function sv(id,v){
let o=document.getElementById('vo-'+id),h=document.getElementById('vh-'+id);
let btns=o.parentElement.querySelectorAll('.vb');
if(v==='h'&&h){o.style.display='none';h.style.display='block';btns[0].classList.remove('on');btns[1].classList.add('on')}
else{o.style.display='block';if(h)h.style.display='none';btns[0].classList.add('on');btns[1].classList.remove('on')}
}

function cp(id){
let el=document.getElementById('vo-'+id);
let text=el.querySelector('.mb').innerText;
navigator.clipboard.writeText(text).then(()=>{
let btn=el.closest('.cb').querySelector('.cpb');
btn.textContent='Copied!';btn.classList.add('ok');
setTimeout(()=>{btn.textContent='Copy Text';btn.classList.remove('ok')},2000);
});
}

// Tab switch
function st(t){
AT=t;
document.querySelectorAll('.pn').forEach(p=>p.classList.remove('on'));
document.getElementById('pn-'+t).classList.add('on');
document.querySelectorAll('.bt').forEach(b=>b.classList.remove('on'));
document.querySelectorAll('.bt')[['courses','lessons','manuals','marketing'].indexOf(t)].classList.add('on');
doFilter();
}

// Course filter
function fc(btn,c){
AC=c;document.querySelectorAll('.fc').forEach(b=>b.classList.remove('on'));btn.classList.add('on');doFilter();
}

function doFilter(){
let q=(document.getElementById('sq').value||'').toLowerCase();
let panel=document.getElementById('pn-'+AT);
if(!panel)return;
panel.querySelectorAll('.cd').forEach(cd=>{
let mc=!AC||cd.dataset.c===AC;
let ms=!q||(cd.dataset.t||'').includes(q);
cd.style.display=(mc&&ms)?'block':'none';
});
panel.querySelectorAll('.sh').forEach(sh=>{
let next=sh.nextElementSibling,vis=false;
while(next&&!next.classList.contains('sh')){
if(next.classList.contains('cd')&&next.style.display!=='none')vis=true;
next=next.nextElementSibling;
}
sh.style.display=vis?'flex':'none';
});
}

// ── Edit System ──
function openEdit(id,idx){
let ea=document.getElementById('ea-'+id);
let ta=document.getElementById('et-'+id);
let it=D[idx];
let editKey='edit-'+it.fp;
let current=localStorage.getItem(editKey)||it.md;
ta.value=current;
ea.classList.toggle('on');
if(ea.classList.contains('on')){ta.focus();ta.setSelectionRange(0,0)}
}

function saveEdit(id,idx){
let ta=document.getElementById('et-'+id);
let it=D[idx];
let editKey='edit-'+it.fp;
let newText=ta.value;
if(newText===it.md){localStorage.removeItem(editKey)}
else{localStorage.setItem(editKey,newText)}
// Re-render the content
let vo=document.getElementById('vo-'+id);
if(vo){let mb=vo.querySelector('.mb');if(mb)mb.innerHTML=md2h(newText)}
document.getElementById('ea-'+id).classList.remove('on');
document.getElementById('es-'+id).textContent='Saved at '+new Date().toLocaleTimeString();
setTimeout(()=>document.getElementById('es-'+id).textContent='',3000);
updateEditsBar();
}

function cancelEdit(id){document.getElementById('ea-'+id).classList.remove('on')}

function discardEdit(id,idx){
let it=D[idx];
let editKey='edit-'+it.fp;
localStorage.removeItem(editKey);
let vo=document.getElementById('vo-'+id);
if(vo){let mb=vo.querySelector('.mb');if(mb)mb.innerHTML=md2h(it.md)}
document.getElementById('ea-'+id).classList.remove('on');
updateEditsBar();
}

function getEditCount(){
let count=0;
for(let i=0;i<localStorage.length;i++){
if(localStorage.key(i).startsWith('edit-'))count++;
}
return count;
}

function updateEditsBar(){
let c=getEditCount();
let bar=document.getElementById('edits-bar');
let count=document.getElementById('edits-count');
if(c>0){bar.classList.add('on');count.textContent=c+' pending edit'+(c>1?'s':'')}
else{bar.classList.remove('on')}
}

function exportEdits(){
let edits=[];
for(let i=0;i<localStorage.length;i++){
let k=localStorage.key(i);
if(k.startsWith('edit-')){
let fp=k.substring(5);
edits.push({file:fp,content:localStorage.getItem(k)});
}
}
if(!edits.length)return;
let json=JSON.stringify(edits,null,2);
if(navigator.clipboard){
navigator.clipboard.writeText(json).then(()=>{
let btn=document.querySelector('.export-btn');
btn.textContent='Copied '+edits.length+' edits!';
setTimeout(()=>btn.textContent='Export Edits',2000);
});
}
// Also offer download
let blob=new Blob([json],{type:'application/json'});
let url=URL.createObjectURL(blob);
let a=document.createElement('a');
a.href=url;a.download='lecture-edits-'+new Date().toISOString().split('T')[0]+'.json';
a.click();URL.revokeObjectURL(url);
}

function clearAllEdits(){
if(!confirm('Clear all pending edits?'))return;
let keys=[];
for(let i=0;i<localStorage.length;i++){
let k=localStorage.key(i);
if(k.startsWith('edit-'))keys.push(k);
}
keys.forEach(k=>localStorage.removeItem(k));
updateEditsBar();
}

// Init edits bar on load
setTimeout(updateEditsBar,500);
</script>
</body>
</html>
